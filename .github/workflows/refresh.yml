name: Refresh Dashboard

on:
  schedule:
    # Runs every day at 7:00 AM CST (13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:   # Also allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard
        env:
          TABLEAU_TOKEN_NAME: ${{ secrets.TABLEAU_TOKEN_NAME }}
          TABLEAU_TOKEN_VALUE: ${{ secrets.TABLEAU_TOKEN_VALUE }}
        run: python generate_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sales_management_dashboard_v2.html
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u '+%b %d, %Y %H:%M UTC')"
          git push
