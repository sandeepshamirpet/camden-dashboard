name: Refresh Dashboard

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fix Node.js 20 deprecation

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore SalesDashboard/SalesDashboard.csproj

      - name: Build dashboard generator
        run: dotnet build SalesDashboard/SalesDashboard.csproj --configuration Release --no-restore

      - name: Run dashboard generator
        env:
          SF_CLIENT_ID:     ${{ secrets.SF_CLIENT_ID }}
          SF_CLIENT_SECRET: ${{ secrets.SF_CLIENT_SECRET }}
          SF_USERNAME:      ${{ secrets.SF_USERNAME }}
          SF_PASSWORD:      ${{ secrets.SF_PASSWORD }}
        run: dotnet SalesDashboard/bin/Release/net8.0/SalesDashboard.dll

      - name: Commit and push updated dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/sandeepshamirpet/camden-dashboard.git
          git add sales_management_dashboard_v2.html
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u '+%b %d, %Y %H:%M UTC')"
          git push
